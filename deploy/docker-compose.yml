services:
  polyedge-api:
    build:
      context: ..
      dockerfile: packages/backend/Dockerfile
    image: ${POLYEDGE_API_IMAGE:-polyedge-api:local}
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${POLYEDGE_API_BIND:-0.0.0.0}:${POLYEDGE_API_PORT:-38001}:38001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:38001/healthz >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  polyedge-worker:
    image: ${POLYEDGE_API_IMAGE:-polyedge-api:local}
    restart: unless-stopped
    env_file:
      - .env
    command: ["polyedge-worker"]
    depends_on:
      polyedge-api:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  polyedge-front:
    build:
      context: ..
      dockerfile: packages/front/Dockerfile
    image: ${POLYEDGE_FRONT_IMAGE:-polyedge-front:local}
    restart: unless-stopped
    environment:
      POLYEDGE_API_UPSTREAM: ${POLYEDGE_API_UPSTREAM:-http://polyedge-api:38001}
      POLYEDGE_CONSOLE_STEP_UP_CODE: ${POLYEDGE_CONSOLE_STEP_UP_CODE:?set POLYEDGE_CONSOLE_STEP_UP_CODE in deploy/.env}
    ports:
      - "${POLYEDGE_FRONT_BIND:-0.0.0.0}:${POLYEDGE_FRONT_PORT:-33002}:33002"
    depends_on:
      polyedge-api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:33002/healthz >/dev/null",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
