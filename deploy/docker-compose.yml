services:
  polyedge-server:
    build:
      context: ../bin
      dockerfile: ../deploy/server.Dockerfile
    image: ${POLYEDGE_SERVER_IMAGE:-polyedge-server:local}
    restart: unless-stopped
    logging: &default-logging
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    env_file:
      - ${POLYEDGE_SERVER_ENV_FILE:-.env.server}
    volumes:
      - ${POLYEDGE_WALLET_IMPORT_PRIVATE_KEY_FILE:-./secrets/polyedge-wallet-import-private.pem}:/run/secrets/polyedge-wallet-import-private.pem:ro
      - ${POLYEDGE_WALLET_STORAGE_KEY_FILE:-./secrets/polyedge-wallet-storage-key}:/run/secrets/polyedge-wallet-storage-key:ro
    expose:
      - "38001"
    command: ["polyedge-server"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:38001/healthz >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  polyedge-front:
    depends_on:
      polyedge-server:
        condition: service_healthy
    build:
      context: ../packages/front
      dockerfile: Dockerfile
    image: ${POLYEDGE_FRONT_IMAGE:-polyedge-front:local}
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "${POLYEDGE_FRONT_BIND:-0.0.0.0}:${POLYEDGE_FRONT_PORT:-33002}:80"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1/healthz >/dev/null",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
