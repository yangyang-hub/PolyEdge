services:
  polyedge-api:
    build:
      context: ../bin
      dockerfile: ../deploy/backend.Dockerfile
    image: ${POLYEDGE_API_IMAGE:-polyedge-api:local}
    restart: unless-stopped
    logging: &default-logging
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    env_file:
      - .env
      - .env.api
    ports:
      - "${POLYEDGE_API_BIND:-0.0.0.0}:${POLYEDGE_API_PORT:-38001}:38001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:38001/healthz >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  polyedge-orderbook:
    image: ${POLYEDGE_API_IMAGE:-polyedge-api:local}
    restart: unless-stopped
    logging: *default-logging
    env_file:
      - .env
      - .env.orderbook
    ports:
      - "${POLYEDGE_ORDERBOOK_BIND:-0.0.0.0}:${POLYEDGE_ORDERBOOK_PORT:-38002}:38002"
    command: ["polyedge-orderbook"]
    depends_on:
      polyedge-api:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:38002/healthz >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  polyedge-worker:
    image: ${POLYEDGE_API_IMAGE:-polyedge-api:local}
    restart: unless-stopped
    logging: *default-logging
    env_file:
      - .env
      - .env.worker
    environment:
      POLYEDGE_ORDERBOOK__SERVICE_URL: ${POLYEDGE_ORDERBOOK__SERVICE_URL:-http://polyedge-orderbook:38002}
    command: ["polyedge-worker"]
    depends_on:
      polyedge-api:
        condition: service_healthy
      polyedge-orderbook:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  polyedge-front:
    build:
      context: ../packages/front
      dockerfile: Dockerfile
    image: ${POLYEDGE_FRONT_IMAGE:-polyedge-front:local}
    restart: unless-stopped
    logging: *default-logging
    env_file:
      - .env
      - .env.front
    environment:
      POLYEDGE_CONSOLE_STEP_UP_CODE: ${POLYEDGE_CONSOLE_STEP_UP_CODE:?set POLYEDGE_CONSOLE_STEP_UP_CODE in deploy/.env}
    ports:
      - "${POLYEDGE_FRONT_BIND:-0.0.0.0}:${POLYEDGE_FRONT_PORT:-33002}:80"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1/healthz >/dev/null",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
