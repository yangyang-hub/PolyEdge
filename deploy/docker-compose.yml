services:
  polyedge-api:
    build:
      context: ../bin
      dockerfile: ../deploy/backend.Dockerfile
    image: ${POLYEDGE_API_IMAGE:-polyedge-api:local}
    restart: unless-stopped
    logging: &default-logging
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    env_file:
      - .env
    ports:
      - "${POLYEDGE_API_BIND:-0.0.0.0}:${POLYEDGE_API_PORT:-38001}:38001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:38001/healthz >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  polyedge-worker:
    image: ${POLYEDGE_API_IMAGE:-polyedge-api:local}
    restart: unless-stopped
    logging: *default-logging
    env_file:
      - .env
    environment:
      POLYEDGE_WORKER__POLL_NEWS: ${POLYEDGE_WORKER__POLL_NEWS:-false}
      POLYEDGE_WORKER__PROMOTE_NEWS_EVENTS: ${POLYEDGE_WORKER__PROMOTE_NEWS_EVENTS:-false}
      POLYEDGE_WORKER__POLL_ARBITRAGE_RADAR: ${POLYEDGE_WORKER__POLL_ARBITRAGE_RADAR:-false}
      POLYEDGE_WORKER__ANALYZE_ARBITRAGE_OPPORTUNITIES: ${POLYEDGE_WORKER__ANALYZE_ARBITRAGE_OPPORTUNITIES:-false}
      POLYEDGE_WORKER__POLL_REWARD_BOT: ${POLYEDGE_WORKER__POLL_REWARD_BOT:-false}
      POLYEDGE_WORKER__DRAIN_EXECUTION_QUEUE: ${POLYEDGE_WORKER__DRAIN_EXECUTION_QUEUE:-false}
      POLYEDGE_WORKER__POLL_PAPER_ORDER_STATUSES: ${POLYEDGE_WORKER__POLL_PAPER_ORDER_STATUSES:-false}
      POLYEDGE_WORKER__RECONCILE_PAPER_FILLS: ${POLYEDGE_WORKER__RECONCILE_PAPER_FILLS:-false}
      POLYEDGE_WORKER__POLL_POLYMARKET_ORDER_STATUSES: ${POLYEDGE_WORKER__POLL_POLYMARKET_ORDER_STATUSES:-false}
      POLYEDGE_WORKER__RECONCILE_POLYMARKET_FILLS: ${POLYEDGE_WORKER__RECONCILE_POLYMARKET_FILLS:-false}
      POLYEDGE_WORKER__CONSUME_POLYMARKET_USER_EVENTS: ${POLYEDGE_WORKER__CONSUME_POLYMARKET_USER_EVENTS:-false}
      POLYEDGE_WORKER__POLL_MARKET_SYNC: ${POLYEDGE_WORKER__POLL_MARKET_SYNC:-false}
      POLYEDGE_WORKER__CONSUME_ORDERBOOK_STREAM: ${POLYEDGE_WORKER__CONSUME_ORDERBOOK_STREAM:-false}
      POLYEDGE_WORKER__POLL_COPYTRADE: ${POLYEDGE_WORKER__POLL_COPYTRADE:-false}
      POLYEDGE_WORKER__ANALYZE_WALLETS: ${POLYEDGE_WORKER__ANALYZE_WALLETS:-false}
      POLYEDGE_WORKER__RECOMPUTE_SIGNALS: ${POLYEDGE_WORKER__RECOMPUTE_SIGNALS:-false}
    command: ["polyedge-worker"]
    depends_on:
      polyedge-api:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  polyedge-front:
    build:
      context: ../packages/front
      dockerfile: Dockerfile
    image: ${POLYEDGE_FRONT_IMAGE:-polyedge-front:local}
    restart: unless-stopped
    logging: *default-logging
    environment:
      POLYEDGE_API_UPSTREAM: ${POLYEDGE_API_UPSTREAM:-http://polyedge-api:38001}
      POLYEDGE_CONSOLE_STEP_UP_CODE: ${POLYEDGE_CONSOLE_STEP_UP_CODE:?set POLYEDGE_CONSOLE_STEP_UP_CODE in deploy/.env}
    ports:
      - "${POLYEDGE_FRONT_BIND:-0.0.0.0}:${POLYEDGE_FRONT_PORT:-33002}:80"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1/healthz >/dev/null",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
