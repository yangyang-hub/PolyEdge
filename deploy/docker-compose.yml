services:
  polyedge-orderbook:
    build:
      context: ../bin
      dockerfile: ../deploy/orderbook.Dockerfile
    image: ${POLYEDGE_ORDERBOOK_IMAGE:-polyedge-orderbook:local}
    restart: unless-stopped
    logging: &default-logging
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    env_file:
      - .env.orderbook
    ports:
      - "${POLYEDGE_ORDERBOOK_BIND:-0.0.0.0}:${POLYEDGE_ORDERBOOK_PORT:-38002}:38002"
    command: ["polyedge-orderbook"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:38002/healthz >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  polyedge-api:
    build:
      context: ../bin
      dockerfile: ../deploy/api.Dockerfile
    image: ${POLYEDGE_API_IMAGE:-polyedge-api:local}
    restart: unless-stopped
    logging: *default-logging
    env_file:
      - .env.api
    ports:
      - "${POLYEDGE_API_BIND:-0.0.0.0}:${POLYEDGE_API_PORT:-38001}:38001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:38001/healthz >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  polyedge-front:
    build:
      context: ../packages/front
      dockerfile: Dockerfile
    image: ${POLYEDGE_FRONT_IMAGE:-polyedge-front:local}
    restart: unless-stopped
    logging: *default-logging
    env_file:
      - .env.front
    ports:
      - "${POLYEDGE_FRONT_BIND:-0.0.0.0}:${POLYEDGE_FRONT_PORT:-33002}:80"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1/healthz >/dev/null",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
