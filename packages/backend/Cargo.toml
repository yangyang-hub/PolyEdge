[workspace]
members = [
  "server",
  "crates/connectors",
  "crates/contracts",
  "crates/domain",
]
resolver = "3"

[workspace.package]
edition = "2024"
license = "MIT"
version = "0.1.0"

[workspace.dependencies]
aes-gcm = "0.10.3"
async-trait = "0.1.89"
argon2 = "0.5.3"
hex = "0.4.3"
k256 = "0.13.4"
sha3 = "0.10.8"
axum = { version = "0.8.6", features = ["macros", "ws"] }
base64 = "0.22.1"
dotenvy = "0.15.7"
# Keep the dependency key as `polymarket-client-sdk` so existing `polymarket_client_sdk`
# imports resolve to the CLOB V2 crate.
polymarket-client-sdk = { package = "polymarket_client_sdk_v2", version = "0.6.0-canary.1", features = ["clob", "tracing"] }
reqwest = "0.13.2"
rsa = { version = "0.9.10", features = ["pem", "sha2"] }
rust_decimal = { version = "1.39.0", features = ["serde"] }
rustls = { version = "0.23", default-features = false, features = ["ring", "std"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = { version = "1.0.145", features = ["raw_value"] }
secrecy = "0.10.3"
sha2 = "0.10.9"
sqlx = { version = "0.8.6", default-features = false, features = ["json", "macros", "migrate", "postgres", "runtime-tokio-rustls", "rust_decimal", "time", "uuid"] }
thiserror = "2.0.17"
time = { version = "0.3.44", features = ["formatting", "macros", "parsing", "serde"] }
tokio = { version = "1.48.0", features = ["macros", "rt-multi-thread", "signal", "sync", "time"] }
tower = { version = "0.5.2", features = ["util"] }
tower-http = { version = "0.6.6", features = ["cors", "limit", "timeout", "trace"] }
tracing = "0.1.41"
tracing-subscriber = { version = "0.3.20", features = ["env-filter", "fmt", "json"] }
uuid = { version = "1.18.1", features = ["serde", "v4", "v7"] }
zeroize = { version = "1.8.2", features = ["serde"] }

[workspace.lints.clippy]
dbg_macro = "deny"
todo = "deny"
unwrap_used = "deny"
