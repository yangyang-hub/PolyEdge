[workspace]
members = [
  "apps/api",
  "apps/orderbook",
  "apps/replay",
  "apps/worker",
  "crates/application",
  "crates/connectors",
  "crates/contracts",
  "crates/domain",
  "crates/infrastructure",
]
resolver = "3"

[workspace.package]
edition = "2024"
license = "MIT"
version = "0.1.0"

[workspace.dependencies]
async-trait = "0.1.89"
axum = { version = "0.8.6", features = ["macros"] }
base64 = "0.22.1"
config = { version = "0.15.18", default-features = false, features = ["toml"] }
dotenvy = "0.15.7"
ed25519-dalek = { version = "2.2.0", features = ["rand_core"] }
futures = "0.3.32"
# Keep the dependency key as `polymarket-client-sdk` so existing `polymarket_client_sdk`
# imports resolve to the CLOB V2 crate.
polymarket-client-sdk = { package = "polymarket_client_sdk_v2", version = "0.6.0-canary.1", features = ["clob", "tracing", "ws"] }
redis = { version = "0.32.7", default-features = false, features = ["tokio-comp"] }
reqwest = "0.13.2"
rust_decimal = { version = "1.39.0", features = ["serde"] }
rustls = { version = "0.23", default-features = false, features = ["ring", "std"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = { version = "1.0.145", features = ["raw_value"] }
sha2 = "0.10.9"
sqlx = { version = "0.8.6", default-features = false, features = ["json", "macros", "migrate", "postgres", "runtime-tokio-rustls", "rust_decimal", "time", "uuid"] }
thiserror = "2.0.17"
time = { version = "0.3.44", features = ["formatting", "macros", "parsing", "serde"] }
tokio = { version = "1.48.0", features = ["macros", "rt-multi-thread", "signal", "sync", "time"] }
tower = { version = "0.5.2", features = ["util"] }
tower-http = { version = "0.6.6", features = ["cors", "limit", "timeout", "trace"] }
tracing = "0.1.41"
tracing-subscriber = { version = "0.3.20", features = ["env-filter", "fmt", "json"] }
uuid = { version = "1.18.1", features = ["serde", "v4", "v7"] }

[workspace.lints.clippy]
dbg_macro = "deny"
todo = "deny"
unwrap_used = "deny"
